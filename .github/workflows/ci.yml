name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22, 24]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify config schema is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('config.schema.json','utf8'))"

      - name: Verify packaged contents
        run: |
          set -e
          OUTPUT=$(npm pack --dry-run --json)
          for required in "dist/index.js" "dist/accessory.js" "config.schema.json" "README.md" "CHANGELOG.md" "LICENSE"; do
              echo "$OUTPUT" | node -e "
                  const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                  const files = (data[0] && data[0].files || []).map(f => f.path);
                  if (!files.includes('$required')) {
                      console.error('Missing from package: $required');
                      process.exit(1);
                  }
              "
          done

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  required-checks:
    name: All checks passed
    needs: [test, audit]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          [ "${{ needs.test.result }}" = "success" ] || exit 1
          [ "${{ needs.audit.result }}" = "success" ] || exit 1
